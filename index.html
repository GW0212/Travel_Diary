<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>TRAVEL LOG · 여행 다이어리</title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-bg" aria-hidden="true"></div>

  <header class="topbar">
    <button class="brand" id="homeBtn" type="button" aria-label="맨 위로">
      <span>T</span><span>R</span><span>A</span><span>V</span><span>E</span><span>L</span>
      <i></i>
      <span>L</span><span>O</span><span>G</span>
    </button>
    <button class="theme-btn" id="themeBtn" type="button" aria-label="다크 모드 전환">☀️</button>
  </header>

  <main class="layout">
    <aside class="panel destinations-panel" aria-label="여행지 목록">
      <div class="panel-head">
        <h1>여행지 목록</h1>
        <button class="square-btn primary-soft" id="addDestinationBtn" type="button" aria-label="여행지 추가">+</button>
      </div>
      <div class="destination-list" id="destinationList"></div>
      <div class="data-row">
        <button class="ghost-btn" id="exportBtn" type="button">⬇ 내보내기</button>
        <button class="ghost-btn" id="importBtn" type="button">⬆ 가져오기</button>
        <input id="importFile" type="file" accept="application/json" hidden>
      </div>
    </aside>

    <section class="content-area">
      <section class="panel selected-panel" id="selectedPanel"></section>
      <section class="entries" id="entries"></section>
    </section>
  </main>

  <div class="modal-layer" id="destinationModal" aria-hidden="true">
    <div class="modal small-modal" role="dialog" aria-modal="true" aria-labelledby="destinationModalTitle">
      <button class="modal-close-btn" data-close="destinationModal" type="button" aria-label="닫기">×</button>
      <h2 id="destinationModalTitle">여행지 추가</h2>
      <label class="field">
        <span>아이콘</span>
        <button class="icon-picker-btn" id="destinationIconBtn" type="button">📍</button>
      </label>
      <label class="field">
        <span>나라</span>
        <input id="destinationCountry" type="text" placeholder="예: 일본">
      </label>
      <label class="field">
        <span>도시</span>
        <input id="destinationCity" type="text" placeholder="예: 오사카">
      </label>
      <div class="modal-actions">
        <button class="ghost-btn" data-close="destinationModal" type="button">취소</button>
        <button class="main-btn" id="saveDestinationBtn" type="button">저장</button>
      </div>
    </div>
  </div>

  <div class="modal-layer" id="iconModal" aria-hidden="true">
    <div class="modal icon-modal" role="dialog" aria-modal="true">
      <button class="modal-close-btn" data-close="iconModal" type="button" aria-label="닫기">×</button>
      <h2>아이콘 선택</h2>
      <p class="modal-sub">국기를 선택하면 나라명이 자동으로 입력돼요.</p>
      <div class="icon-section-title">국기</div>
      <div class="icon-grid" id="flagGrid"></div>
      <div class="icon-section-title">여행 아이콘</div>
      <div class="icon-grid" id="emojiGrid"></div>
      <label class="field compact-field">
        <span>직접 입력</span>
        <div class="inline-field">
          <input id="customIconInput" type="text" maxlength="4" placeholder="예: 🌋">
          <button class="main-btn" id="customIconApply" type="button">적용</button>
        </div>
      </label>
    </div>
  </div>

  <div class="modal-layer" id="entryModal" aria-hidden="true">
    <div class="modal entry-modal" role="dialog" aria-modal="true" aria-labelledby="entryModalTitle">
      <button class="modal-close-btn" data-close="entryModal" type="button" aria-label="닫기">×</button>
      <h2 id="entryModalTitle">기록 추가</h2>
      <label class="field">
        <span>제목</span>
        <input id="entryTitle" type="text" placeholder="예: 도톤보리의 밤">
      </label>
      <label class="field">
        <span>날짜</span>
        <button class="date-button" id="entryDateButton" type="button">
          <b id="entryDateLabel">날짜 선택</b>
          <small>여행한 날을 골라주세요</small>
          <em aria-hidden="true">▾</em>
        </button>
      </label>
      <label class="field">
        <span>내용</span>
        <textarea id="entryContent" rows="6" placeholder="여행에서의 기억을 적어보세요..."></textarea>
      </label>
      <div class="field">
        <span>구글맵 / 유튜브 링크</span>
        <button class="ghost-btn full-btn" id="addLinkBtn" type="button">+ 링크 추가</button>
        <div class="link-list" id="linkList"></div>
        <p class="help-text">URL을 붙여넣으면 구글맵/유튜브를 자동으로 구분해요.</p>
      </div>
      <div class="modal-actions">
        <button class="ghost-btn" data-close="entryModal" type="button">취소</button>
        <button class="main-btn" id="saveEntryBtn" type="button">저장</button>
      </div>
    </div>
  </div>

  <div class="modal-layer" id="orderModal" aria-hidden="true">
    <div class="modal order-modal" role="dialog" aria-modal="true">
      <button class="modal-close-btn" data-close="orderModal" type="button" aria-label="닫기">×</button>
      <h2>순서 변경</h2>
      <p class="modal-sub">드래그하거나 숫자를 입력해 순서를 정리하세요.</p>
      <div class="order-list" id="orderList"></div>
      <div class="modal-actions">
        <button class="ghost-btn" data-close="orderModal" type="button">취소</button>
        <button class="main-btn" id="saveOrderBtn" type="button">순서 저장</button>
      </div>
    </div>
  </div>

  <div class="modal-layer" id="confirmModal" aria-hidden="true">
    <div class="modal confirm-modal" role="dialog" aria-modal="true">
      <button class="modal-close-btn" data-close="confirmModal" type="button" aria-label="닫기">×</button>
      <div class="confirm-icon">🗑️</div>
      <p id="confirmText">삭제하시겠습니까?</p>
      <div class="modal-actions">
        <button class="ghost-btn" data-close="confirmModal" type="button">취소</button>
        <button class="danger-btn" id="confirmOkBtn" type="button">삭제</button>
      </div>
    </div>
  </div>

  <button class="scroll-top-btn" id="scrollTopBtn" type="button" aria-label="최상단으로 이동" title="최상단으로 이동">↑</button>

  <div class="calendar" id="calendar" hidden></div>
  <div class="toast" id="toast"></div>

<script>
(() => {
  'use strict';

  const STORAGE_KEY = 'travelDiaryData_v1';

  const FLAG_COUNTRIES = {
    kr:'대한민국', jp:'일본', cn:'중국', tw:'대만', hk:'홍콩', th:'태국', vn:'베트남', sg:'싱가포르',
    my:'말레이시아', id:'인도네시아', ph:'필리핀', in:'인도', np:'네팔', kh:'캄보디아', la:'라오스',
    mn:'몽골', ae:'아랍에미리트', qa:'카타르', tr:'튀르키예', fr:'프랑스', de:'독일', it:'이탈리아',
    es:'스페인', pt:'포르투갈', gb:'영국', nl:'네덜란드', ch:'스위스', at:'오스트리아', be:'벨기에',
    gr:'그리스', cz:'체코', hu:'헝가리', pl:'폴란드', se:'스웨덴', no:'노르웨이', fi:'핀란드',
    dk:'덴마크', is:'아이슬란드', ie:'아일랜드', us:'미국', ca:'캐나다', mx:'멕시코', br:'브라질',
    ar:'아르헨티나', cl:'칠레', au:'호주', nz:'뉴질랜드', eg:'이집트', ma:'모로코', za:'남아공'
  };
  const FLAG_CODES = Object.keys(FLAG_COUNTRIES);
  const EMOJIS = ['📍','✈️','🧳','🗺️','🏖️','🏝️','🏔️','⛩️','🏯','🏰','🎡','🚂','⛴️','🌅','🌃','🍜','🍣','☕','🛍️','📷','⭐','🎒'];
  const KOR_MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  const $ = (sel, root=document) => root.querySelector(sel);
  const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));
  const uid = () => 'id_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);

  let state;
  let editingDestinationId = null;
  let editingEntryId = null;
  let selectedIcon = '📍';
  let confirmCallback = null;
  let calendarAnchor = null;
  let calendarMode = 'days';
  let calendarView = new Date();
  let calendarValue = today();
  let calendarOnSelect = null;

  function today() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function escapeHtml(v) {
    return String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function nl2br(v) {
    return escapeHtml(v).replace(/\n/g, '<br>');
  }

  function parseDate(value) {
    const p = String(value || '').split('-').map(Number);
    if (p.length !== 3 || p.some(n => !Number.isFinite(n))) return new Date();
    return new Date(p[0], p[1] - 1, p[2]);
  }


  function flagEmojiFromCode(code) {
    const cc = String(code || '').trim().slice(0,2).toUpperCase();
    if (!/^[A-Z]{2}$/.test(cc)) return '📍';
    return String.fromCodePoint(...[...cc].map(ch => 127397 + ch.charCodeAt(0)));
  }

  function dateValue(date) {
    return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
  }

  function formatDate(value) {
    const d = parseDate(value);
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  }

  function formatDateLong(value) {
    const d = parseDate(value);
    const day = ['일','월','화','수','목','금','토'][d.getDay()];
    return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${day})`;
  }

  function defaultState() {
    const destId = uid();
    return {
      selectedId: destId,
      destinations: [{
        id: destId,
        icon: 'flag:kr',
        country: '대한민국',
        city: '서울',
        entries: [{
          id: uid(),
          title: '여행지 다이어리에 오신 것을 환영합니다',
          date: today(),
          content: '왼쪽 여행지 목록에서 + 버튼을 눌러 새로운 여행지를 등록해보세요.\n여행지를 선택한 뒤 + 새 기록을 누르면 그날의 기록을 남길 수 있어요.\n유튜브 링크를 추가하면 롱폼은 16:9, 쇼츠는 9:16 비율로 자동 재생됩니다.\n\n즐거운 여행 기록 되세요! ✈️',
          items: [],
          videos: [],
          places: [],
          collapsed: false
        }]
      }]
    };
  }

  function normalizeState(data) {
    if (!data || !Array.isArray(data.destinations)) return defaultState();
    data.destinations.forEach(dest => {
      if (!dest.id) dest.id = uid();
      if (!dest.icon) dest.icon = '📍';
      if (!Array.isArray(dest.entries)) dest.entries = [];
      dest.entries.forEach(entry => {
        if (!entry.id) entry.id = uid();
        if (!entry.title) entry.title = '제목 없음';
        if (!entry.date) entry.date = today();
        if (typeof entry.collapsed !== 'boolean') entry.collapsed = false;
        if (!Array.isArray(entry.items)) {
          const items = [];
          (entry.places || []).forEach(url => items.push({id:uid(), type:'map', url}));
          (entry.videos || []).forEach(url => items.push({id:uid(), type:'video', url}));
          entry.items = items;
        }
      });
    });
    if (!data.selectedId || !data.destinations.some(d => d.id === data.selectedId)) {
      data.selectedId = data.destinations[0]?.id || null;
    }
    return data;
  }

  function load() {
    try { return normalizeState(JSON.parse(localStorage.getItem(STORAGE_KEY))); }
    catch { return defaultState(); }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function selectedDest() {
    return state.destinations.find(d => d.id === state.selectedId) || state.destinations[0] || null;
  }

  function renderIcon(icon, cls='') {
    if (String(icon).startsWith('flag:')) {
      const code = icon.slice(5).toLowerCase();
      return `<img class="flag ${cls}" src="flags/${code}.svg" alt="${code.toUpperCase()} 국기" loading="lazy">`;
    }
    return `<span class="${cls}">${escapeHtml(icon || '📍')}</span>`;
  }

  function render() {
    renderDestinations();
    renderSelected();
    renderEntries();
    save();
  }

  function renderDestinations() {
    const list = $('#destinationList');
    const destinations = state.destinations;
    if (!destinations.length) {
      list.innerHTML = '<div class="empty-small">등록된 여행지가 없습니다.</div>';
      return;
    }
    list.innerHTML = destinations.map(dest => `
      <button class="destination-item ${dest.id === state.selectedId ? 'active' : ''}" data-dest-id="${dest.id}" type="button" draggable="true">
        <span class="destination-icon">${renderIcon(dest.icon)}</span>
        <strong>${escapeHtml(dest.country)} - ${escapeHtml(dest.city)}</strong>
        <i aria-hidden="true"></i>
      </button>
    `).join('');
  }

  function renderSelected() {
    const panel = $('#selectedPanel');
    const dest = selectedDest();
    if (!dest) {
      panel.innerHTML = '<div class="empty-large">여행지를 추가해 주세요.</div>';
      return;
    }
    panel.innerHTML = `
      <div class="selected-title">
        <span class="selected-icon">${renderIcon(dest.icon, 'large-flag')}</span>
        <h2>${escapeHtml(dest.country)} - ${escapeHtml(dest.city)}</h2>
      </div>
      <div class="selected-tools" aria-label="여행지 관리">
        <button class="square-btn" id="editDestinationBtn" type="button" aria-label="여행지 수정">✎</button>
        <button class="square-btn" id="deleteDestinationBtn" type="button" aria-label="여행지 삭제">×</button>
      </div>
      <div class="selected-actions">
        <button class="ghost-btn" id="orderBtn" type="button">순서 변경</button>
        <button class="main-btn" id="addEntryBtn" type="button">+ 새 기록</button>
      </div>
    `;
  }

  function renderEntries() {
    const wrap = $('#entries');
    const dest = selectedDest();
    if (!dest) {
      wrap.innerHTML = '';
      return;
    }
    if (!dest.entries.length) {
      wrap.innerHTML = `
        <article class="panel empty-large">
          <div>📔</div>
          <h3>아직 기록이 없어요</h3>
          <p>+ 새 기록 버튼으로 첫 다이어리를 남겨보세요.</p>
        </article>`;
      return;
    }
    wrap.innerHTML = dest.entries.map(entry => {
      const hidden = entry.collapsed ? 'hidden' : '';
      const media = (entry.items || []).map(renderMedia).join('');
      return `
        <article class="entry-card panel ${entry.collapsed ? 'collapsed' : ''}" data-entry-id="${entry.id}">
          <div class="entry-head">
            <div class="entry-main">
              <div class="entry-title-wrap">
                <button class="check" data-action="toggle-entry" data-entry-id="${entry.id}" aria-pressed="${entry.collapsed ? 'true' : 'false'}" type="button">
                  <span></span>
                </button>
                <h3>${escapeHtml(entry.title || '제목 없음')}</h3>
              </div>
              <button class="date-chip" data-action="entry-date" data-entry-id="${entry.id}" type="button">
                <span>DATE</span><b>${formatDate(entry.date)}</b><em>🗓️</em>
              </button>
            </div>
            <div class="entry-actions">
              <button class="square-btn" data-action="edit-entry" data-entry-id="${entry.id}" type="button" aria-label="기록 수정">✎</button>
              <button class="square-btn" data-action="delete-entry" data-entry-id="${entry.id}" type="button" aria-label="기록 삭제">×</button>
            </div>
          </div>
          <div class="entry-body" ${hidden}>
            ${entry.content ? `<p class="entry-text">${nl2br(entry.content)}</p>` : ''}
            ${media ? `<div class="media-list">${media}</div>` : ''}
          </div>
        </article>`;
    }).join('');
  }

  function renderMedia(item) {
    if (!item || !item.url) return '';
    if (item.type === 'video') {
      const id = youtubeId(item.url);
      if (!id) return `<a class="plain-link" href="${escapeHtml(item.url)}" target="_blank" rel="noopener">YouTube 링크 열기</a>`;
      const shorts = /shorts\//i.test(item.url);
      return `<div class="video-box ${shorts ? 'shorts' : ''}"><iframe src="https://www.youtube.com/embed/${id}" title="YouTube video" allowfullscreen loading="lazy"></iframe></div>`;
    }
    if (item.type === 'map') {
      const title = mapTitle(item.url);
      const q = encodeURIComponent(title || item.url);
      return `
        <div class="map-box">
          <div class="map-head"><b>📍 ${escapeHtml(title || 'Google 지도')}</b><a href="${escapeHtml(item.url)}" target="_blank" rel="noopener">지도에서 보기 ↗</a></div>
          <iframe src="https://www.google.com/maps?q=${q}&output=embed" title="Google Map" loading="lazy"></iframe>
        </div>`;
    }
    return `<a class="plain-link" href="${escapeHtml(item.url)}" target="_blank" rel="noopener">${escapeHtml(item.url)}</a>`;
  }

  function youtubeId(url) {
    const s = String(url);
    return (s.match(/youtu\.be\/([\w-]{6,})/) || s.match(/[?&]v=([\w-]{6,})/) || s.match(/shorts\/([\w-]{6,})/) || [])[1] || '';
  }

  function mapTitle(url) {
    try {
      const u = decodeURIComponent(String(url));
      const place = (u.match(/\/place\/([^/?]+)/) || [])[1];
      if (place) return place.replace(/\+/g, ' ');
      const q = (u.match(/[?&]q=([^&]+)/) || [])[1];
      if (q) return q.replace(/\+/g, ' ');
    } catch {}
    return 'Google 지도';
  }

  function inferType(url) {
    if (youtubeId(url)) return 'video';
    if (/google\.[^/]+\/maps|maps\.app\.goo\.gl|goo\.gl\/maps/i.test(url)) return 'map';
    return 'link';
  }

  function showToast(message, danger=false) {
    const el = $('#toast');
    el.textContent = message;
    el.className = danger ? 'toast danger show' : 'toast show';
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => el.classList.remove('show'), 2200);
  }

  function openModal(id) {
    const el = $('#' + id);
    el.classList.add('open');
    el.setAttribute('aria-hidden', 'false');
  }

  function closeModal(id) {
    const el = $('#' + id);
    el.classList.remove('open');
    el.setAttribute('aria-hidden', 'true');
  }

  function openDestinationModal(id=null) {
    editingDestinationId = id;
    const dest = id ? state.destinations.find(d => d.id === id) : null;
    $('#destinationModalTitle').textContent = dest ? '여행지 수정' : '여행지 추가';
    $('#destinationCountry').value = dest?.country || '';
    $('#destinationCity').value = dest?.city || '';
    selectedIcon = dest?.icon || '📍';
    $('#destinationIconBtn').innerHTML = renderIcon(selectedIcon);
    openModal('destinationModal');
    setTimeout(() => $('#destinationCountry').focus(), 40);
  }

  function saveDestination() {
    const country = $('#destinationCountry').value.trim();
    const city = $('#destinationCity').value.trim();
    if (!country || !city) return showToast('나라와 도시를 입력해 주세요.', true);

    if (editingDestinationId) {
      const dest = state.destinations.find(d => d.id === editingDestinationId);
      Object.assign(dest, {country, city, icon: selectedIcon});
    } else {
      const dest = {id: uid(), icon: selectedIcon, country, city, entries: []};
      state.destinations.push(dest);
      state.selectedId = dest.id;
    }
    closeModal('destinationModal');
    render();
  }

  function openIconModal() {
    openModal('iconModal');
  }

  function chooseIcon(icon) {
    selectedIcon = icon;
    $('#destinationIconBtn').innerHTML = renderIcon(icon);
    if (icon.startsWith('flag:')) {
      const code = icon.slice(5);
      $('#destinationCountry').value = FLAG_COUNTRIES[code] || $('#destinationCountry').value;
    }
    closeModal('iconModal');
  }

  function openEntryModal(id=null) {
    editingEntryId = id;
    const dest = selectedDest();
    const entry = id ? dest.entries.find(e => e.id === id) : null;
    $('#entryModalTitle').textContent = entry ? '기록 수정' : '기록 추가';
    $('#entryTitle').value = entry?.title || '';
    $('#entryContent').value = entry?.content || '';
    $('#entryDateButton').dataset.value = entry?.date || today();
    $('#entryDateLabel').textContent = formatDateLong(entry?.date || today());
    const linkList = $('#linkList');
    linkList.innerHTML = '';
    (entry?.items || []).forEach(item => addLinkRow(item.url));
    openModal('entryModal');
    setTimeout(() => $('#entryTitle').focus(), 40);
  }

  function addLinkRow(url='') {
    const row = document.createElement('div');
    row.className = 'link-row';
    row.innerHTML = `
      <span class="type-badge">링크</span>
      <input type="text" placeholder="구글맵 또는 유튜브 URL" value="${escapeHtml(url)}">
      <button class="square-btn" type="button" aria-label="링크 삭제">×</button>
    `;
    const input = $('input', row);
    const badge = $('.type-badge', row);
    const update = () => badge.textContent = inferType(input.value) === 'video' ? '유튜브' : inferType(input.value) === 'map' ? '구글맵' : '링크';
    input.addEventListener('input', update);
    input.addEventListener('blur', update);
    $('button', row).addEventListener('click', () => row.remove());
    $('#linkList').appendChild(row);
    update();
    setTimeout(() => input.focus(), 30);
  }

  function saveEntry() {
    const dest = selectedDest();
    if (!dest) return;
    const title = $('#entryTitle').value.trim() || '제목 없음';
    const content = $('#entryContent').value.trim();
    const date = $('#entryDateButton').dataset.value || today();
    const items = $$('.link-row input').map(input => {
      const url = input.value.trim();
      return url ? {id: uid(), type: inferType(url), url} : null;
    }).filter(Boolean);

    if (editingEntryId) {
      const entry = dest.entries.find(e => e.id === editingEntryId);
      Object.assign(entry, {title, content, date, items, videos: items.filter(i=>i.type==='video').map(i=>i.url), places: items.filter(i=>i.type==='map').map(i=>i.url)});
    } else {
      dest.entries.push({id: uid(), title, content, date, items, videos: [], places: [], collapsed: false});
    }
    closeModal('entryModal');
    render();
  }

  function confirm(message, callback) {
    $('#confirmText').textContent = message;
    confirmCallback = callback;
    openModal('confirmModal');
    setTimeout(() => $('#confirmOkBtn').focus(), 40);
  }

  function openOrderModal() {
    const dest = selectedDest();
    if (!dest) return;
    $('#orderList').innerHTML = dest.entries.map((entry, idx) => `
      <div class="order-row" draggable="true" data-entry-id="${entry.id}">
        <strong>${escapeHtml(entry.title || '제목 없음')}</strong>
        <label><span>순서</span><input type="number" min="1" max="${dest.entries.length}" value="${idx+1}"></label>
      </div>
    `).join('');
    openModal('orderModal');
  }

  function normalizeOrderNumbers() {
    $$('#orderList .order-row').forEach((row, idx) => {
      const input = $('input', row);
      input.value = idx + 1;
    });
  }

  function saveOrder() {
    const dest = selectedDest();
    const ids = $$('#orderList .order-row').map(row => row.dataset.entryId);
    dest.entries = ids.map(id => dest.entries.find(e => e.id === id)).filter(Boolean);
    closeModal('orderModal');
    render();
  }

  function openCalendar(anchor, value, onSelect) {
    const cal = $('#calendar');
    if (!cal.hidden && calendarAnchor === anchor) {
      closeCalendar();
      return;
    }
    calendarAnchor = anchor;
    calendarOnSelect = onSelect;
    calendarValue = value || today();
    const d = parseDate(calendarValue);
    calendarView = new Date(d.getFullYear(), d.getMonth(), 1);
    calendarMode = 'days';
    renderCalendar();
    cal.hidden = false;
    positionCalendar();
  }

  function closeCalendar() {
    $('#calendar').hidden = true;
    calendarAnchor = null;
  }

  function positionCalendar() {
    const cal = $('#calendar');
    if (!calendarAnchor || cal.hidden) return;
    const rect = calendarAnchor.getBoundingClientRect();
    const width = Math.min(330, window.innerWidth - 24);
    let left = rect.left + rect.width/2 - width/2;
    left = Math.max(12, Math.min(left, window.innerWidth - width - 12));
    let top = rect.bottom + 10;
    if (window.innerWidth <= 640) {
      top = window.innerHeight / 2;
      cal.style.transform = 'translateY(-50%)';
    } else {
      cal.style.transform = 'none';
      if (top + 350 > window.innerHeight) top = Math.max(12, rect.top - 350);
    }
    cal.style.width = width + 'px';
    cal.style.left = left + 'px';
    cal.style.top = top + 'px';
  }

  function renderCalendar() {
    const cal = $('#calendar');
    const year = calendarView.getFullYear();
    const month = calendarView.getMonth();

    if (calendarMode === 'years') {
      const start = year - 5;
      cal.innerHTML = `
        <div class="cal-head">
          <button data-cal="prev-year-block" type="button">‹</button>
          <button class="cal-title" data-cal="to-months" type="button">🐻 ${start}년 - ${start+11}년</button>
          <button data-cal="next-year-block" type="button">›</button>
        </div>
        <div class="year-grid">${Array.from({length:12},(_,i)=>start+i).map(y=>`<button class="${y===year?'active':''}" data-year="${y}" type="button">${y}년</button>`).join('')}</div>
        <div class="cal-foot"><button data-cal="today" type="button">오늘</button></div>`;
      return;
    }

    if (calendarMode === 'months') {
      cal.innerHTML = `
        <div class="cal-head">
          <button data-cal="prev-year" type="button">‹</button>
          <button class="cal-title" data-cal="to-years" type="button">🐻 ${year}년</button>
          <button data-cal="next-year" type="button">›</button>
        </div>
        <div class="month-grid">${KOR_MONTHS.map((m,i)=>`<button class="${i===month?'active':''}" data-month="${i}" type="button">${m}</button>`).join('')}</div>
        <div class="cal-foot"><button data-cal="today" type="button">오늘</button></div>`;
      return;
    }

    const first = new Date(year, month, 1);
    const start = new Date(year, month, 1 - first.getDay());
    const days = [];
    for (let i=0; i<42; i++) {
      const d = new Date(start);
      d.setDate(start.getDate() + i);
      const val = dateValue(d);
      const cls = [d.getMonth() !== month ? 'muted' : '', val === calendarValue ? 'active' : '', val === today() ? 'today' : ''].join(' ');
      days.push(`<button class="${cls}" data-date="${val}" type="button">${d.getDate()}</button>`);
    }
    cal.innerHTML = `
      <div class="cal-head">
        <button data-cal="prev-month" type="button">‹</button>
        <button class="cal-title" data-cal="to-months" type="button">🐻 ${year}년 ${month+1}월</button>
        <button data-cal="next-month" type="button">›</button>
      </div>
      <div class="week"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>
      <div class="day-grid">${days.join('')}</div>
      <div class="cal-foot"><button data-cal="today" type="button">오늘</button></div>`;
  }

  function initIconGrids() {
    $('#flagGrid').innerHTML = FLAG_CODES.map(code => `<button class="icon-cell" data-icon="flag:${code}" type="button">${renderIcon('flag:'+code)}<small>${FLAG_COUNTRIES[code]}</small></button>`).join('');
    $('#emojiGrid').innerHTML = EMOJIS.map(icon => `<button class="icon-cell" data-icon="${escapeHtml(icon)}" type="button">${icon}</button>`).join('');
  }

  function exportData() {
    const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `travel-log-${today()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function importData(file) {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        state = normalizeState(JSON.parse(reader.result));
        render();
        showToast('데이터를 가져왔습니다.');
      } catch {
        showToast('JSON 파일을 확인해 주세요.', true);
      }
    };
    reader.readAsText(file);
  }

  function bindEvents() {
    $('#homeBtn').addEventListener('click', () => window.scrollTo({top:0, behavior:'smooth'}));
    $('#themeBtn').addEventListener('click', () => {
      const root = document.documentElement;
      const next = root.dataset.theme === 'dark' ? 'light' : 'dark';
      root.dataset.theme = next;
      localStorage.setItem('travelLogTheme', next);
      $('#themeBtn').textContent = next === 'dark' ? '🌙' : '☀️';
    });

    $('#destinationList').addEventListener('click', e => {
      const item = e.target.closest('.destination-item');
      if (!item) return;
      state.selectedId = item.dataset.destId;
      render();
      if (window.innerWidth <= 640) {
        setTimeout(() => $('#selectedPanel').scrollIntoView({behavior:'smooth', block:'start'}), 40);
      }
    });

    $('#destinationList').addEventListener('dragstart', e => {
      const row = e.target.closest('.destination-item');
      if (!row) return;
      row.classList.add('dragging');
      e.dataTransfer.setData('text/plain', row.dataset.destId);
    });
    $('#destinationList').addEventListener('dragover', e => {
      const drag = $('.destination-item.dragging');
      if (!drag) return;
      e.preventDefault();
      const rows = $$('.destination-item:not(.dragging)', $('#destinationList'));
      const after = rows.find(row => e.clientY < row.getBoundingClientRect().top + row.offsetHeight/2);
      $('#destinationList').insertBefore(drag, after || null);
    });
    $('#destinationList').addEventListener('dragend', () => {
      const drag = $('.destination-item.dragging');
      if (drag) drag.classList.remove('dragging');
      const ids = $$('.destination-item').map(el => el.dataset.destId);
      state.destinations = ids.map(id => state.destinations.find(d => d.id === id)).filter(Boolean);
      render();
    });

    document.body.addEventListener('click', e => {
      if (e.target.closest('#addDestinationBtn')) return openDestinationModal();
      if (e.target.closest('#editDestinationBtn')) return openDestinationModal(state.selectedId);
      if (e.target.closest('#deleteDestinationBtn')) {
        const dest = selectedDest();
        if (!dest) return;
        return confirm(`"${dest.country} - ${dest.city}" 여행지를 삭제할까요?`, () => {
          state.destinations = state.destinations.filter(d => d.id !== dest.id);
          state.selectedId = state.destinations[0]?.id || null;
          closeModal('confirmModal');
          render();
        });
      }
      if (e.target.closest('#addEntryBtn')) return openEntryModal();
      if (e.target.closest('#orderBtn')) return openOrderModal();
      if (e.target.closest('#addLinkBtn')) return addLinkRow();
      if (e.target.closest('#saveDestinationBtn')) return saveDestination();
      if (e.target.closest('#destinationIconBtn')) return openIconModal();
      if (e.target.closest('#saveEntryBtn')) return saveEntry();
      if (e.target.closest('#saveOrderBtn')) return saveOrder();
      if (e.target.closest('#exportBtn')) return exportData();
      if (e.target.closest('#importBtn')) return $('#importFile').click();

      const close = e.target.closest('[data-close]');
      if (close) return closeModal(close.dataset.close);

      const iconCell = e.target.closest('.icon-cell');
      if (iconCell) return chooseIcon(iconCell.dataset.icon);

      if (e.target.closest('#customIconApply')) {
        const val = $('#customIconInput').value.trim();
        if (!val) return showToast('아이콘을 입력해 주세요.', true);
        return chooseIcon(val);
      }

      const toggleEntryBtn = e.target.closest('[data-action="toggle-entry"]');
      if (toggleEntryBtn) {
        const dest = selectedDest();
        const entry = dest.entries.find(en => en.id === toggleEntryBtn.dataset.entryId);
        if (entry) {
          entry.collapsed = !entry.collapsed;
          render();
        }
        return;
      }

      const entryDate = e.target.closest('[data-action="entry-date"]');
      if (entryDate) {
        const dest = selectedDest();
        const entry = dest.entries.find(en => en.id === entryDate.dataset.entryId);
        return openCalendar(entryDate, entry?.date || today(), value => {
          if (entry) entry.date = value;
          closeCalendar();
          render();
        });
      }

      const editEntry = e.target.closest('[data-action="edit-entry"]');
      if (editEntry) return openEntryModal(editEntry.dataset.entryId);

      const deleteEntry = e.target.closest('[data-action="delete-entry"]');
      if (deleteEntry) {
        const dest = selectedDest();
        return confirm('이 기록을 삭제할까요?', () => {
          dest.entries = dest.entries.filter(en => en.id !== deleteEntry.dataset.entryId);
          closeModal('confirmModal');
          render();
        });
      }

      if (e.target.closest('#confirmOkBtn')) {
        if (confirmCallback) confirmCallback();
        confirmCallback = null;
        return;
      }

      const calBtn = e.target.closest('[data-cal]');
      if (calBtn) {
        const action = calBtn.dataset.cal;
        if (action === 'prev-month') calendarView.setMonth(calendarView.getMonth()-1);
        if (action === 'next-month') calendarView.setMonth(calendarView.getMonth()+1);
        if (action === 'to-months') calendarMode = 'months';
        if (action === 'to-years') calendarMode = 'years';
        if (action === 'prev-year') calendarView.setFullYear(calendarView.getFullYear()-1);
        if (action === 'next-year') calendarView.setFullYear(calendarView.getFullYear()+1);
        if (action === 'prev-year-block') calendarView.setFullYear(calendarView.getFullYear()-12);
        if (action === 'next-year-block') calendarView.setFullYear(calendarView.getFullYear()+12);
        if (action === 'today') {
          const val = today();
          if (calendarOnSelect) calendarOnSelect(val);
          return closeCalendar();
        }
        renderCalendar();
        return positionCalendar();
      }

      const monthBtn = e.target.closest('[data-month]');
      if (monthBtn) {
        calendarView.setMonth(Number(monthBtn.dataset.month));
        calendarMode = 'days';
        renderCalendar();
        return positionCalendar();
      }

      const yearBtn = e.target.closest('[data-year]');
      if (yearBtn) {
        calendarView.setFullYear(Number(yearBtn.dataset.year));
        calendarMode = 'months';
        renderCalendar();
        return positionCalendar();
      }

      const dateBtn = e.target.closest('[data-date]');
      if (dateBtn) {
        if (calendarOnSelect) calendarOnSelect(dateBtn.dataset.date);
        return closeCalendar();
      }

      if (!e.target.closest('#calendar') && !(calendarAnchor && calendarAnchor.contains(e.target))) closeCalendar();
    });

    $('#entryDateButton').addEventListener('click', () => {
      const btn = $('#entryDateButton');
      openCalendar(btn, btn.dataset.value || today(), value => {
        btn.dataset.value = value;
        $('#entryDateLabel').textContent = formatDateLong(value);
        closeCalendar();
      });
    });

    $('#orderList').addEventListener('input', e => {
      const input = e.target.closest('input[type="number"]');
      if (!input) return;
      const rows = $$('#orderList .order-row');
      const current = input.closest('.order-row');
      const currentIndex = rows.indexOf(current);
      let target = Number(input.value);
      if (!Number.isInteger(target) || target < 1) target = currentIndex + 1;
      if (target > rows.length) {
        input.value = currentIndex + 1;
        return showToast('해당 개수만큼의 다이어리가 없습니다.', true);
      }
      const targetIndex = target - 1;
      if (targetIndex === currentIndex) return;
      if (targetIndex > currentIndex) $('#orderList').insertBefore(current, rows[targetIndex].nextSibling);
      else $('#orderList').insertBefore(current, rows[targetIndex]);
      normalizeOrderNumbers();
    });
    $('#orderList').addEventListener('dragstart', e => {
      const row = e.target.closest('.order-row');
      if (!row) return;
      row.classList.add('dragging');
    });
    $('#orderList').addEventListener('dragover', e => {
      const drag = $('.order-row.dragging');
      if (!drag) return;
      e.preventDefault();
      const rows = $$('#orderList .order-row:not(.dragging)');
      const after = rows.find(row => e.clientY < row.getBoundingClientRect().top + row.offsetHeight/2);
      $('#orderList').insertBefore(drag, after || null);
      normalizeOrderNumbers();
    });
    $('#orderList').addEventListener('dragend', () => {
      const drag = $('.order-row.dragging');
      if (drag) drag.classList.remove('dragging');
      normalizeOrderNumbers();
    });

    $('#importFile').addEventListener('change', e => {
      const file = e.target.files[0];
      if (file) importData(file);
      e.target.value = '';
    });

    $$('.modal-layer').forEach(layer => {
      layer.addEventListener('click', event => {
        if (event.target === layer) closeModal(layer.id);
      });
    });

    const scrollTopBtn = $('#scrollTopBtn');
    if (scrollTopBtn) {
      const toggleScrollTop = () => {
        scrollTopBtn.classList.toggle('show', window.scrollY > 360);
      };
      window.addEventListener('scroll', toggleScrollTop, {passive: true});
      scrollTopBtn.addEventListener('click', () => window.scrollTo({top: 0, behavior: 'smooth'}));
      toggleScrollTop();
    }

    window.addEventListener('resize', positionCalendar);
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        closeCalendar();
        $$('.modal-layer.open').forEach(m => closeModal(m.id));
      }
    });
  }

  function init() {
    const theme = localStorage.getItem('travelLogTheme') || 'light';
    document.documentElement.dataset.theme = theme;
    $('#themeBtn').textContent = theme === 'dark' ? '🌙' : '☀️';
    state = load();
    initIconGrids();
    bindEvents();
    render();
  }

  init();
})();
</script>
</body>
</html>
